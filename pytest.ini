[pytest]
# Test options
addopts = -v -s
    --alluredir=./reports/allure-results
    --clean-alluredir

testpaths = case
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test markers
markers =
    smoke: Smoke test cases
    critical: Critical test cases
    normal: Normal test cases
    slow: Slow running test cases
